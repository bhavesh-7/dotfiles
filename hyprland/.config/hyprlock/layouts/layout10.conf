$wall = $HOME/.local/share/backgrounds/wallpp88
# $wall = $HOME/.config/hyprlock/wallpapers/hyprlock.png
# source = $HOME/.config/hyprlock/fonts/SF Pro Display Bold
# source = $HOME/.config/hyprlock/fonts/SF Pro Display Bold
$font = "JetBrainsMono Nerd Font Propo"
# BACKGROUND
background {
    monitor =
    path = $wall
    blur_passes = 4
    blur_size = 1
    contrast = 0.8916
    brightness = 0.8916
    vibrancy = 0.8916
    vibrancy_darkness = 0.0
}

# GENERAL
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%I:%M")</span>"
    color = rgba(216, 222, 233, 0.80)
    font_size = 60
    font_family = $font
    position = 0, 75
    halign = center
    valign = center
}

# Day-Month-Date
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A, %B %d")"
    color = rgba(216, 222, 233, .80)
    font_size = 19
    font_family = $font
    position = 0, 10
    halign = center
    valign = center
}

# GREETING
label {
    monitor =
    text = Welcome!
    color = rgba(216, 222, 233, .80)
    font_size = 9
    font_family = $font
    position = 0, -480 
    halign = center
    valign = center
}

